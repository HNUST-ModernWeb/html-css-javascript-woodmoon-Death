<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息卡片</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">个人信息卡片</h1>
        
        <div class="card">
            <div class="avatar-section">
                <div class="avatar-container">
                    <img id="avatar" src="default-avatar.svg" alt="个人头像" class="avatar">
                    <input type="file" id="avatar-input" accept="image/*" class="avatar-input">
                    <label for="avatar-input" class="avatar-upload-btn">更换头像</label>
                </div>
            </div>
            
            <div class="info-section">
                <div class="field">
                    <label for="name-input">姓名：</label>
                    <input type="text" id="name-input" class="input-field" placeholder="请输入姓名">
                    <span id="name-display" class="display-text">张三</span>
                </div>
                
                <div class="field">
                    <label for="bio-input">个人简介：</label>
                    <textarea id="bio-input" class="textarea-field" placeholder="请输入个人简介"></textarea>
                    <span id="bio-display" class="display-text">热爱编程，喜欢学习新技术</span>
                </div>
                
                <button id="save-btn" class="save-btn">保存</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
